---
- name: Instalar pré-requisitos (gpg)
  ansible.builtin.apt:
    name: gpg
    state: present
    update_cache: true
    cache_valid_time: 7200

- name: Baixar a chave de assinatura GPG da Microsoft (formato armored)
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /tmp/microsoft.asc
    mode: "0644"

- name: Fazer dearmor e instalar a chave de assinatura GPG da Microsoft
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/microsoft.gpg /tmp/microsoft.asc
    creates: /usr/share/keyrings/microsoft.gpg

- name: Adicionar o repositório apt do VS Code
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/vscode.sources
    content: |
      Types: deb
      URIs: https://packages.microsoft.com/repos/code
      Suites: stable
      Components: main
      Architectures: amd64,arm64,armhf
      Signed-By: /usr/share/keyrings/microsoft.gpg
    owner: root
    group: root
    mode: "0644"

- name: Atualizar índice de pacotes apt
  ansible.builtin.apt:
    update_cache: true

- name: Instalar Visual Studio Code
  ansible.builtin.apt:
    name: code
    state: present
